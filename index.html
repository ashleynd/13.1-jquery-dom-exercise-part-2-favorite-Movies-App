<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>My Favorite Movies</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
    integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.8.2/css/all.css">
</head>

<body">
  <div class="heading">
    <h1>My Favorite Movies</h1>

    <form class="form-list" id="enter-movie">
      <div class="form-group">
        <label for="title">Title
        <input type="text" required id="title" class="form">
      </div>
      
      <div class="form-group">
        <label for="rating">Rating
        <input type="number" required  min="0" max="10" id="rating" class="form">
      </div>
        
      <div class="form-group">
        <button type="submit" class="btn btn-primary form">Submit</button>
      </div>
    </form>
  </div>
  <br>
  <table class="table">
    <thead class="thead">
      <tr>
        <th scope="column">Title <input id="title" class="fas fa-sort-down"></input></th>
        <th scope="column">Rating <input id="rating" class="fas fa-sort-down"></input></th>
        <th scope="column">Delete </input></th>
      </tr>
    </thead>
    <tbody id="movie-list">
      
    </tbody>
  </table>

  <script src="https://code.jquery.com/jquery-3.4.1.js" integrity="sha256-WpOohJOqMqqyKL9FccASB9O0KwACQJpFTUBLTYOVvVU="
    crossorigin="anonymous"></script>
  
  
  
  
  
  
  
  
  <script>
    let currentId = 0;
    let moviesList = [];

$(function() {
  $("#enter-movie").on("submit", function(event) {
    event.preventDefault();
    let title = $("#title").val();
    let rating = $("#rating").val();

    let movieData = { title, rating, currentId };
    const HTMLtoAppend = createMovieDataHTML(movieData);

    currentId++
    moviesList.push(movieData);

    $("#movie-list").append(HTMLtoAppend);
    $("#new-movie-form").trigger("reset");
  });


  $("tbody").on("click", ".btn.btn-danger", function(event) {
    let indexToRemoveAt = moviesList.findIndex(movie => movie.currentId === +$(event.target).data("deleteId"))
    moviesList.splice(indexToRemoveAt, 1)
    $(event.target)
      .closest("tr")
      .remove();
    
  });

  $(".fas").on("click", function(event) {
    
    let direction = $(event.target).hasClass("fa-sort-down") ? "down" : "up";
    let keyToSortBy = $(event.target).attr("id");
    let sortedMovies = sortBy(moviesList, keyToSortBy, direction);
    
    $("#movie-list-here").empty();

    for (let movie of sortedMovies) {
      const HTMLtoAppend = createMovieDataHTML(movie);
      $("#movie-list-here").append(HTMLtoAppend);
    }

    $(event.target).toggleClass("fa-sort-down");
    $(event.target).toggleClass("fa-sort-up");
  });
});


function sortBy(array, keyToSortBy, direction) {
  return array.sort(function(a, b) {
    if (keyToSortBy === "rating") {
      a[keyToSortBy] = +a[keyToSortBy];
      b[keyToSortBy] = +b[keyToSortBy];
    }
    if (a[keyToSortBy] > b[keyToSortBy]) {
      return direction === "up" ? 1 : -1;
    } else if (b[keyToSortBy] > a[keyToSortBy]) {
      return direction === "up" ? -1 : 1;
    }
    return 0;
  });
}


function createMovieDataHTML(data) {
  return `
    <tr>
      <td>${data.title}</td>
      <td>${data.rating}</td>
      <td>
        <button class="btn btn-danger" data-delete-id=${data.currentId}>
          Delete
        </button>
      </td>
    <tr>
  `;
}

  </script>  
</body>
</html>
